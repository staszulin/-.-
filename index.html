<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דיווח נהג - גדא י.קרן בע"מ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6 text-right">
    <div class="max-w-md mx-auto bg-slate-800 p-8 rounded-2xl border-2 border-yellow-600 shadow-2xl">
        <h1 class="text-2xl font-bold text-yellow-500 text-center mb-6">דיווח שבועי - גדא י.קרן</h1>
        <form class="space-y-4">
            <div><label class="block text-sm mb-1">שם הנהג</label><input type="text" class="w-full p-3 rounded bg-slate-700 border border-slate-600 text-white outline-none focus:border-yellow-500"></div>
            <div><label class="block text-sm mb-1">מספר רכב</label><input type="text" class="w-full p-3 rounded bg-slate-700 border border-slate-600 text-white outline-none focus:border-yellow-500"></div>
            <div><label class="block text-sm mb-1">קילומטראז' עדכני</label><input type="number" class="w-full p-3 rounded bg-slate-700 border border-slate-600 text-white outline-none focus:border-yellow-500"></div>
            <button type="button" class="w-full bg-yellow-600 text-black font-bold py-4 rounded-xl hover:bg-yellow-500 transition-all">שלח דיווח לסטאס</button>
        </form>
    </div>
</body>
</html>
