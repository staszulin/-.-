<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada grup - דיווח נהג</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4 md:p-8 text-right">
    <div class="max-w-md mx-auto bg-slate-800 p-6 rounded-3xl border-2 border-yellow-600 shadow-2xl text-center">
        <div class="text-5xl font-black italic text-yellow-500 mb-2 uppercase tracking-tighter">Gada grup</div>
        <div class="h-1 w-24 bg-yellow-600 mx-auto mb-6 rounded-full"></div>
        <h1 class="text-2xl font-bold mb-1">גדא י.קרן בע"מ</h1>
        <p class="text-slate-400 mb-8 font-bold text-sm italic">דיווח קילומטראז' - סטס זולין</p>

        <form id="sheetdb-form" class="space-y-4 text-right">
            <div>
                <label class="block text-xs mb-1 mr-1 text-slate-300 font-bold text-right">שם הנהג</label>
                <input type="text" name="data[driver_name]" required class="w-full p-4 rounded-2xl bg-slate-700 border border-slate-600 text-white outline-none focus:border-yellow-500 text-right">
            </div>
            <div>
                <label class="block text-xs mb-1 mr-1 text-slate-300 font-bold text-right">מספר רכב</label>
                <input type="text" name="data[car_number]" required class="w-full p-4 rounded-2xl bg-slate-700 border border-slate-600 text-white outline-none focus:border-yellow-500 text-right">
            </div>
            <div>
                <label class="block text-xs mb-1 mr-1 text-slate-300 font-bold text-right">קילומטראז' עדכני</label>
                <input type="number" name="data[km]" required class="w-full p-4 rounded-2xl bg-slate-700 border border-slate-600 text-white outline-none focus:border-yellow-500 text-right">
            </div>
            <input type="hidden" name="data[date]" id="current-date">
            <button type="submit" id="submit-btn" class="w-full bg-yellow-600 text-black font-black py-5 rounded-2xl hover:bg-yellow-500 transition-all text-xl shadow-xl mt-4 uppercase">שלח דיווח לסטס</button>
        </form>
        <div id="success-msg" class="mt-6 p-4 bg-green-900/30 text-green-400 rounded-xl border border-green-800 hidden font-bold">הדיווח נשלח בהצלחה לסטס!</div>
    </div>

    <script>
        document.getElementById('current-date').value = new Date().toLocaleDateString('he-IL');
        const form = document.getElementById('sheetdb-form');
        form.addEventListener("submit", e => {
          e.preventDefault();
          const btn = document.getElementById('submit-btn');
          btn.innerText = "שולח...";
          btn.disabled = true;

          fetch('https://sheetdb.io/api/v1/ws842wggxsxv', {
              method : 'POST',
              body: new FormData(form),
          }).then(response => response.json())
          .then(data => {
            form.classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
          }).catch(err => {
            alert('שגיאה בשליחה');
            btn.disabled = false;
            btn.innerText = "שלח דיווח לסטס";
          });
        });
    </script>
</body>
</html>
