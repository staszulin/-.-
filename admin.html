<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada Group - Premium Fleet Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #111827, #030712); color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .glass-panel { background: rgba(31, 41, 55, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .test-danger { background: rgba(220, 38, 38, 0.15) !important; border-right: 4px solid #ef4444 !important; }
        .test-warning { background: rgba(245, 158, 11, 0.1) !important; border-right: 4px solid #f59e0b !important; }
        @keyframes pulse-gold { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 6px; }
    </style>
</head>
<body class="p-4 md:p-10 text-right min-h-screen">
    <header class="text-center mb-12">
        <div class="inline-block">
            <div class="text-7xl font-black italic text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 via-yellow-500 to-yellow-700 uppercase tracking-tighter mb-2">GADA GRUP</div>
            <div class="h-1 w-full bg-gradient-to-r from-transparent via-yellow-600 to-transparent rounded-full shadow-[0_0_20px_rgba(202,138,4,0.6)]"></div>
        </div>
        <h1 class="text-3xl font-light tracking-widest text-slate-300 mt-4">ניהול צי רכב פרימיום</h1>
        <p class="text-yellow-600/80 font-bold text-sm uppercase mt-1 tracking-widest">סטס זולין - מנכ"ל</p>
    </header>

    <section class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
        <div class="glass-panel p-4 rounded-2xl gold-border">
            <p class="text-slate-400 text-xs uppercase mb-1">סה"כ רכבים</p>
            <p id="total-cars" class="text-2xl font-black text-white">10</p>
        </div>
        <div class="glass-panel p-4 rounded-2xl gold-border">
            <p class="text-slate-400 text-xs uppercase mb-1">טסטים קרובים</p>
            <p id="urgent-tests" class="text-2xl font-black text-red-500">0</p>
        </div>
        <div class="glass-panel p-4 rounded-2xl gold-border">
            <p class="text-slate-400 text-xs uppercase mb-1">דיווחים השבוע</p>
            <p id="weekly-reports" class="text-2xl font-black text-blue-400">-</p>
        </div>
        <div class="glass-panel p-4 rounded-2xl gold-border">
            <p class="text-slate-400 text-xs uppercase mb-1">סנכרון אחרון</p>
            <p id="sync-time" class="text-xs font-mono text-yellow-500 mt-2">טוען...</p>
        </div>
    </section>

    <main class="max-w-6xl mx-auto">
        <div class="glass-panel rounded-3xl shadow-2xl overflow-hidden border border-white/5">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-white/5 text-slate-400 uppercase text-[10px] font-black tracking-[0.2em]">
                        <th class="p-5">סטטוס</th>
                        <th class="p-5">רכב / נהג</th>
                        <th class="p-5">לוחית זיהוי</th>
                        <th class="p-5">תוקף טסט</th>
                        <th class="p-5 text-yellow-500">ק"מ עדכני</th>
                        <th class="p-5">דיווח אחרון</th>
                    </tr>
                </thead>
                <tbody id="fleet-table" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const staticFleet = [
            { name: "משאית איסוזו סומו", plate: "40131703", test: "01.12.2026" },
            { name: "יונדאי מסחרי (פרנסואה)", plate: "88791401", test: "15.01.2027" },
            { name: "רנו גרנד קופה (בר)", plate: "76666903", test: "26.05.2026" },
            { name: "צ'רי (יצחק)", plate: "50734303", test: "07.12.2026" },
            { name: "צ'רי (ליאור)", plate: "50734404", test: "07.12.2026" },
            { name: "מג'י (דורון)", plate: "20600003", test: "09.04.2026" },
            { name: "אופנוע (יניב)", plate: "52942103", test: "10.10.2026" },
            { name: "רנו גרנד קופה (נועם)", plate: "76860101", test: "02.07.2026" },
            { name: "יונדאי i10 (אריאל)", plate: "73510201", test: "20.07.2026" },
            { name: "MG (איציק)", plate: "87499903", test: "05.08.2026" }
        ];

        function checkTestUrgency(testStr) {
            if (testStr === "-") return 'normal';
            const parts = testStr.split('.');
            const testDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const today = new Date();
            const diffDays = Math.ceil((testDate - today) / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) return 'expired';
            if (diffDays <= 30) return 'urgent';
            if (diffDays <= 60) return 'warning';
            return 'normal';
        }

        async function updateDashboard() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/yzlhwfcvmfebt');
                const reports = await response.json();
                const tableBody = document.getElementById('fleet-table');
                tableBody.innerHTML = '';
                let urgentCount = 0;

                staticFleet.forEach(vehicle => {
                    const latestReport = reports.filter(r => r.car_number.replace(/-/g, '') === vehicle.plate).pop();
                    const urgency = checkTestUrgency(vehicle.test);
                    if (urgency === 'urgent' || urgency === 'expired') urgentCount++;

                    const tr = document.createElement('tr');
                    if (urgency === 'urgent' || urgency === 'expired') tr.className = "test-danger";
                    else if (urgency === 'warning') tr.className = "test-warning";
                    else tr.className = "hover:bg-white/5 transition-all";

                    tr.innerHTML = `
                        <td class="p-5 text-center">
                            <span class="status-dot ${latestReport ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-slate-700'}"></span>
                        </td>
                        <td class="p-5 font-bold text-slate-100">${vehicle.name}</td>
                        <td class="p-5 text-slate-400 font-mono text-xs">${vehicle.plate.replace(/(\d{3})(\d{2})(\d{3})/, '$1-$2-$3')}</td>
                        <td class="p-5 text-xs ${urgency === 'urgent' ? 'text-red-500 font-black' : 'text-slate-400'}">${vehicle.test}</td>
                        <td class="p-5 font-black text-blue-400 text-lg">${latestReport ? Number(latestReport.km).toLocaleString() : '-'}</td>
                        <td class="p-5 text-[10px] text-slate-500 font-mono italic">${latestReport ? latestReport.date : 'ממתין לדיווח'}</td>
                    `;
                    tableBody.appendChild(tr);
                });

                document.getElementById('urgent-tests').innerText = urgentCount;
                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString('he-IL');
            } catch (e) { console.error(e); }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
