<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada Group - Smart Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: system-ui, sans-serif; }
        .vehicle-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; margin-bottom: 1rem; transition: all 0.3s ease; }
        .danger-card { border-right: 6px solid #ef4444; background: rgba(220, 38, 38, 0.1); }
        .warning-card { border-right: 6px solid #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .label { color: #94a3b8; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .val { color: #f8fafc; font-weight: 600; font-size: 0.9rem; }
        .km-badge { background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 4px 10px; border-radius: 8px; font-weight: 900; }
    </style>
</head>
<body class="p-4 min-h-screen">
    <header class="text-center mb-8">
        <div class="text-5xl font-black italic text-yellow-500 uppercase tracking-tighter">GADA GRUP</div>
        <div class="h-1 w-20 bg-yellow-600 mx-auto mt-2 rounded-full"></div>
        <p class="text-slate-400 text-sm mt-2 font-bold uppercase tracking-widest">מערכת בקרת צי רכב</p>
    </header>

    <div id="fleet-container" class="max-w-md mx-auto">
        <p class="text-center text-slate-500 animate-pulse">טוען נתונים מהשטח...</p>
    </div>

    <script>
        const staticFleet = [
            { name: "משאית איסוזו סומו", plate: "401-31-703", test: "01.12.26", ins: "01.12.26", interval: 25000 },
            { name: "יונדאי (פרנסואה)", plate: "887-91-401", test: "15.01.27", ins: "01.01.27", interval: 15000 },
            { name: "רנו קופה (בר)", plate: "766-66-903", test: "26.05.26", ins: "01.06.26", interval: 15000, type: "renault" },
            { name: "צ'רי (יצחק)", plate: "507-34-303", test: "07.12.26", ins: "01.12.26", interval: 15000 },
            { name: "צ'רי (ליאור)", plate: "507-34-404", test: "07.12.26", ins: "01.12.26", interval: 15000 },
            { name: "מג'י (דורון)", plate: "206-00-003", test: "09.04.26", ins: "01.04.26", interval: 10000 },
            { name: "אופנוע (יניב)", plate: "529-42-103", test: "10.10.26", ins: "01.10.26", interval: 6000 },
            { name: "רנו קופה (נועם)", plate: "768-60-101", test: "02.07.26", ins: "01.07.26", interval: 15000, type: "renault" },
            { name: "i10 (אריאל)", plate: "735-10-201", test: "20.07.26", ins: "01.07.26", interval: 15000 },
            { name: "MG (איציק)", plate: "874-99-903", test: "05.08.26", ins: "31.07.26", interval: 15000 }
        ];

        async function updateDashboard() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/yzlhwfcvmfebt');
                const reports = await response.json();
                const container = document.getElementById('fleet-container');
                container.innerHTML = '';

                staticFleet.forEach(v => {
                    const lastReport = reports.filter(r => r.car_number.replace(/-/g,'') === v.plate.replace(/-/g,'')).pop();
                    const currentKm = lastReport ? Number(lastReport.km) : 0;
                    
                    let nextSrv = Math.ceil((currentKm + 1) / v.interval) * v.interval;
                    if (currentKm === 0) nextSrv = v.interval;
                    const isSrvUrgent = (nextSrv - currentKm) <= 500;
                    const isDocUrgent = v.test.includes('.03.26') || v.ins.includes('.03.26') || v.test.includes('.04.26');

                    let srvLabel = nextSrv.toLocaleString();
                    if (v.type === "renault") srvLabel += (nextSrv / 15000) % 2 === 0 ? " (גדול)" : " (קטן)";

                    const card = document.createElement('div');
                    card.className = `vehicle-card p-5 ${isDocUrgent ? 'danger-card' : (isSrvUrgent ? 'warning-card' : '')}`;

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-bold text-white">${v.name}</h3>
                                <p class="text-xs font-mono text-slate-500 tracking-widest">${v.plate}</p>
                            </div>
                            <div class="text-left">
                                <span class="km-badge text-sm">${currentKm > 0 ? currentKm.toLocaleString() : '---'}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 border-t border-white/5 pt-4">
                            <div>
                                <p class="label">טסט</p>
                                <p class="val ${isDocUrgent && v.test.includes('.04') ? 'text-red-500 animate-pulse' : ''}">${v.test}</p>
                            </div>
                            <div>
                                <p class="label">ביטוח</p>
                                <p class="val text-blue-300">${v.ins}</p>
                            </div>
                            <div>
                                <p class="label">טיפול הבא</p>
                                <p class="val ${isSrvUrgent ? 'text-orange-500 font-black' : 'text-green-400'}">${srvLabel}</p>
                            </div>
                        </div>
                        <div class="mt-3 text-[9px] text-slate-600 italic">דיווח אחרון: ${lastReport ? lastReport.date : 'טרם התקבל'}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error("Update failed"); }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
