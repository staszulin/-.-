<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada Group - Fleet Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: system-ui, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .danger-row { background: rgba(239, 68, 68, 0.2) !important; border-right: 4px solid #ef4444 !important; }
        td, th { white-space: nowrap; padding: 12px 8px; text-align: right; }
    </style>
</head>
<body class="p-2 min-h-screen">
    <header class="text-center mb-6">
        <div class="text-5xl font-black italic text-yellow-500 uppercase tracking-tighter">GADA GRUP</div>
        <div class="h-1 w-24 bg-yellow-600 mx-auto mt-2 rounded-full"></div>
        <h1 class="text-lg font-bold text-slate-300 mt-2">ניהול צי רכב - מערכת בקרה</h1>
    </header>

    <main class="max-w-full mx-auto overflow-x-auto">
        <div class="glass-panel rounded-xl shadow-2xl">
            <table class="w-full text-right border-collapse text-xs">
                <thead>
                    <tr class="bg-white/10 text-slate-400 font-black uppercase">
                        <th>נהג / רכב</th>
                        <th>מספר רכב</th>
                        <th>טסט</th>
                        <th class="text-blue-400">ביטוח</th>
                        <th class="text-green-400">טיפול</th>
                        <th class="text-yellow-500 font-bold">ק"מ</th>
                        <th>עדכון</th>
                    </tr>
                </thead>
                <tbody id="fleet-table" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const staticFleet = [
            { name: "משאית איסוזו", plate: "401-31-703", test: "01.12.26", ins: "01.12.26", srv: "15,000" },
            { name: "יונדאי (פרנסואה)", plate: "887-91-401", test: "15.01.27", ins: "01.01.27", srv: "15,000" },
            { name: "רנו (בר)", plate: "766-66-903", test: "26.05.26", ins: "01.06.26", srv: "120,000" },
            { name: "צ'רי (יצחק)", plate: "507-34-303", test: "07.12.26", ins: "01.12.26", srv: "15,000" },
            { name: "צ'רי (ליאור)", plate: "507-34-404", test: "07.12.26", ins: "01.12.26", srv: "15,000" },
            { name: "מג'י (דורון)", plate: "206-00-003", test: "09.04.26", ins: "01.04.26", srv: "10,000" },
            { name: "אופנוע (יניב)", plate: "529-42-103", test: "10.10.26", ins: "01.10.26", srv: "6,000" },
            { name: "רנו (נועם)", plate: "768-60-101", test: "02.07.26", ins: "01.07.26", srv: "15,000" },
            { name: "i10 (אריאל)", plate: "735-10-201", test: "20.07.26", ins: "01.07.26", srv: "15,000" },
            { name: "MG (איציק)", plate: "874-99-903", test: "05.08.26", ins: "31.07.26", srv: "15,000" }
        ];

        async function updateDashboard() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/yzlhwfcvmfebt');
                if (!response.ok) throw new Error('API Error');
                const reports = await response.json();
                const tableBody = document.getElementById('fleet-table');
                tableBody.innerHTML = '';

                staticFleet.forEach(v => {
                    const last = reports.filter(r => r.car_number.replace(/-/g,'') === v.plate.replace(/-/g,'')).pop();
                    
                    const tr = document.createElement('tr');
                    // בדיקת דחיפות טסט/ביטוח (פחות מחודש)
                    const isUrgent = v.test.includes('.03.26') || v.test.includes('.04.26') || v.ins.includes('.03.26') || v.ins.includes('.04.26');
                    if (isUrgent) tr.className = "danger-row";
                    else tr.className = "hover:bg-white/5";

                    tr.innerHTML = `
                        <td class="font-bold text-slate-200">${v.name}</td>
                        <td class="font-mono">${v.plate}</td>
                        <td class="${isUrgent ? 'text-red-500 font-bold' : ''}">${v.test}</td>
                        <td>${v.ins}</td>
                        <td class="text-green-400 font-bold">${v.srv}</td>
                        <td class="font-black text-blue-400 text-sm">${last ? Number(last.km).toLocaleString() : '-'}</td>
                        <td class="text-[9px] text-slate-500">${last ? last.date : '...'}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('fleet-table').innerHTML = '<tr><td colspan="7" class="p-10 text-center text-red-500">שגיאה בחיבור לנתונים. נסה לרענן.</td></tr>';
            }
        }
        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
