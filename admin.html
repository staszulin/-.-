<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada Group - Fleet Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #0f172a, #020617); color: #f1f5f9; font-family: system-ui, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .danger-row { background: rgba(239, 68, 68, 0.15) !important; border-right: 4px solid #ef4444 !important; }
        .warning-row { background: rgba(245, 158, 11, 0.1) !important; border-right: 4px solid #f59e0b !important; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="p-4 md:p-8 text-right min-h-screen">
    <header class="text-center mb-10">
        <div class="inline-block">
            <div class="text-6xl font-black italic text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 via-yellow-500 to-yellow-800 uppercase tracking-tighter">GADA GRUP</div>
            <div class="h-1 w-full bg-gradient-to-r from-transparent via-yellow-600 to-transparent rounded-full shadow-lg"></div>
        </div>
        <h1 class="text-2xl font-bold tracking-widest text-slate-300 mt-4">ניהול צי רכב - מערכת בקרה</h1>
    </header>

    <main class="max-w-full mx-auto">
        <div class="glass-panel rounded-3xl shadow-2xl overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-white/5 text-slate-400 uppercase text-[11px] font-black tracking-widest">
                        <th class="p-4">רכב / נהג</th>
                        <th class="p-4">מספר רכב</th>
                        <th class="p-4">תוקף טסט</th>
                        <th class="p-4 text-blue-400">ביטוח</th>
                        <th class="p-4 text-green-400">טיפול הבא</th>
                        <th class="p-4 text-yellow-500">ק"מ עדכני</th>
                        <th class="p-4">עדכון אחרון</th>
                    </tr>
                </thead>
                <tbody id="fleet-table" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // בסיס הנתונים של הצי שלך
        const staticFleet = [
            { name: "משאית איסוזו סומו", plate: "40131703", test: "01.12.2026", insurance: "01.12.2026", service: "כל 15,000" },
            { name: "יונדאי מסחרי (פרנסואה)", plate: "88791401", test: "15.01.2027", insurance: "01.01.2027", service: "כל 15,000" },
            { name: "רנו גרנד קופה (בר)", plate: "76666903", test: "26.05.2026", insurance: "01.06.2026", service: "120,000" },
            { name: "צ'רי (יצחק)", plate: "50734303", test: "07.12.2026", insurance: "01.12.2026", service: "כל 15,000" },
            { name: "צ'רי (ליאור)", plate: "50734404", test: "07.12.2026", insurance: "01.12.2026", service: "כל 15,000" },
            { name: "מג'י (דורון)", plate: "20600003", test: "09.04.2026", insurance: "01.04.2026", service: "כל 10,000" },
            { name: "אופנוע (יניב)", plate: "52942103", test: "10.10.2026", insurance: "01.10.2026", service: "כל 6,000" },
            { name: "רנו גרנד קופה (נועם)", plate: "76860101", test: "02.07.2026", insurance: "01.07.2026", service: "כל 15,000" },
            { name: "יונדאי i10 (אריאל)", plate: "73510201", test: "20.07.2026", insurance: "01.07.2026", service: "כל 15,000" },
            { name: "MG (איציק)", plate: "87499903", test: "05.08.2026", insurance: "31.07.2026", service: "כל 15,000" }
        ];

        function getUrgency(dateStr) {
            if (!dateStr || dateStr === "-") return 'normal';
            const parts = dateStr.split('.');
            const targetDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const diffDays = Math.ceil((targetDate - new Date()) / (1000 * 60 * 60 * 24));
            if (diffDays <= 30) return 'danger';
            if (diffDays <= 60) return 'warning';
            return 'normal';
        }

        async function updateDashboard() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/yzlhwfcvmfebt');
                const reports = await response.json();
                const tableBody = document.getElementById('fleet-table');
                tableBody.innerHTML = '';

                staticFleet.forEach(vehicle => {
                    const latestReport = reports.filter(r => r.car_number.replace(/-/g, '') === vehicle.plate).pop();
                    const testUrgency = getUrgency(vehicle.test);
                    const insUrgency = getUrgency(vehicle.insurance);
                    
                    const tr = document.createElement('tr');
                    if (testUrgency === 'danger' || insUrgency === 'danger') tr.className = "danger-row";
                    else if (testUrgency === 'warning' || insUrgency === 'warning') tr.className = "warning-row";
                    else tr.className = "hover:bg-white/5 transition-all";

                    tr.innerHTML = `
                        <td class="p-4 font-bold text-slate-100">${vehicle.name}</td>
                        <td class="p-4 text-slate-400 font-mono text-xs">${vehicle.plate.replace(/(\d{3})(\d{2})(\d{3})/, '$1-$2-$3')}</td>
                        <td class="p-4 text-xs ${testUrgency === 'danger' ? 'text-red-500 font-black' : 'text-slate-300'}">${vehicle.test}</td>
                        <td class="p-4 text-xs ${insUrgency === 'danger' ? 'text-red-500 font-black' : 'text-slate-300'}">${vehicle.insurance}</td>
                        <td class="p-4 text-xs text-green-400">${vehicle.service}</td>
                        <td class="p-4 font-black text-blue-400 text-lg">${latestReport ? Number(latestReport.km).toLocaleString() : '-'}</td>
                        <td class="p-4 text-[10px] text-slate-500 font-mono italic">${latestReport ? latestReport.date : 'ממתין...'}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
