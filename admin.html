<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada Group - Live Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: system-ui, sans-serif; padding: 10px; -webkit-user-select: none; user-select: none; }
        .card { background: rgba(30, 41, 59, 0.8); border-radius: 1rem; margin-bottom: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .data-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 12px; margin-top: 10px; }
        .lbl { color: #94a3b8; font-size: 9px; text-align: center; margin-bottom: 2px; }
        .val { color: #fff; font-size: 10px; font-weight: bold; text-align: center; white-space: nowrap; }
        footer { font-size: 10px; color: #475569; text-align: center; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .live-indicator { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; display: inline-block; margin-left: 5px; animation: pulse-green 2s infinite; }
    </style>
</head>
<body oncontextmenu="return false;">
    <header class="text-center mb-6">
        <div class="text-4xl font-black italic text-yellow-500 uppercase tracking-tighter">GADA GRUP</div>
        <div class="h-1 w-20 bg-yellow-600 mx-auto mt-1 rounded-full"></div>
        <div class="text-[9px] text-green-500 mt-2 font-bold"><span class="live-indicator"></span>עדכון אוטומטי פעיל (כל דקה)</div>
    </header>

    <div id="fleet-list"></div>

    <footer>
        <p>© 2026 Gada Group | כל הזכויות שמורות לסטס זולין</p>
        <p class="mt-1 opacity-50 italic">Live Sync System v2.5</p>
    </footer>

    <script>
        const staticFleet = [
            { name: "משאית איסוזו סומו", plate: "401-31-703", test: "01.12.26", ins: "01.12.26", interval: 25000 },
            { name: "יונדאי (פרנסואה)", plate: "887-91-401", test: "15.01.27", ins: "01.01.27", interval: 15000 },
            { name: "רנו קופה (בר)", plate: "766-66-903", test: "26.05.26", ins: "01.06.26", interval: 15000, type: "renault" },
            { name: "צ'רי (יצחק)", plate: "507-34-303", test: "07.12.26", ins: "01.12.26", interval: 15000 },
            { name: "צ'רי (ליאור)", plate: "507-34-404", test: "07.12.26", ins: "01.12.26", interval: 15000 },
            { name: "מג'י (דורון)", plate: "206-00-003", test: "09.04.26", ins: "01.04.26", interval: 10000 },
            { name: "אופנוע (יניב)", plate: "529-42-103", test: "10.10.26", ins: "01.10.26", interval: 6000 },
            { name: "רנו קופה (נועם)", plate: "768-60-101", test: "02.07.26", ins: "01.07.26", interval: 15000, type: "renault" },
            { name: "i10 (אריאל)", plate: "735-10-201", test: "20.07.26", ins: "01.07.26", interval: 15000 },
            { name: "MG (איציק)", plate: "874-99-903", test: "05.08.26", ins: "31.07.26", interval: 15000 }
        ];

        function displayFleet(reports = []) {
            const list = document.getElementById('fleet-list');
            let html = '';

            staticFleet.forEach(v => {
                const last = reports.find(r => r.car_number && r.car_number.replace(/-/g,'') === v.plate.replace(/-/g,''));
                const currentKm = last ? Number(last.km) : 0;
                let nextSrv = Math.ceil((currentKm + 1) / v.interval) * v.interval;
                if (currentKm === 0) nextSrv = v.interval;
                let srvTxt = nextSrv.toLocaleString();
                if (v.type === "renault") srvTxt += (nextSrv/15000)%2===0 ? " (גד)" : " (קט)";

                html += `
                    <div class="card ${v.test.includes('.04.26') ? 'border-r-4 border-red-500' : ''}">
                        <div class="text-right px-1">
                            <h3 class="font-bold text-white text-base leading-tight">${v.name}</h3>
                            <p class="text-[9px] text-slate-500 font-mono tracking-tighter">${v.plate}</p>
                        </div>
                        <div class="data-row">
                            <div><p class="lbl">ק"מ</p><p class="val text-blue-400 font-black italic">${currentKm > 0 ? currentKm.toLocaleString() : '---'}</p></div>
                            <div><p class="lbl">טסט</p><p class="val">${v.test}</p></div>
                            <div><p class="lbl">ביטוח</p><p class="val">${v.ins}</p></div>
                            <div><p class="lbl">טיפול</p><p class="val text-green-400">${srvTxt}</p></div>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        }

        displayFleet();

        async function fetchUpdates() {
            try {
                // הוספת מזהה ייחודי למניעת שמירת נתונים ישנים בדפדפן (Cache busting)
                const res = await fetch(`https://sheetdb.io/api/v1/yzlhwfcvmfebt?t=${Date.now()}`);
                const data = await res.json();
                if (Array.isArray(data)) displayFleet(data);
            } catch (e) { console.log("Offline mode"); }
        }

        // עדכון ראשון מיד
        fetchUpdates();
        
        // רענון אוטומטי כל 60 שניות בדיוק
        setInterval(fetchUpdates, 60000);
    </script>
</body>
</html>
