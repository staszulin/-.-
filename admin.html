<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada grup - ניהול צי חי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0f1d; color: #e2e8f0; }
        .gold-accent { color: #d4af37; }
        .premium-card { background: #161e2d; border: 1px solid #1e293b; }
    </style>
</head>
<body class="p-4 md:p-10 text-right font-sans">
    <header class="text-center mb-10">
        <div class="text-6xl font-black italic text-yellow-500 mb-2 uppercase tracking-tighter">Gada grup</div>
        <div class="h-1.5 w-32 bg-yellow-600 mx-auto mb-6 rounded-full shadow-lg"></div>
        <h1 class="text-4xl font-extrabold gold-accent mb-2">גדא י.קרן בע"מ</h1>
        <p class="text-slate-400 font-bold text-lg italic">ניהול צי רכב - סטס זולין</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="premium-card p-6 rounded-3xl shadow-2xl overflow-x-auto border-t-4 border-yellow-600 text-right">
            <h2 class="text-xl font-bold text-yellow-500 mb-4 mr-2">דיווחים אחרונים מהשטח:</h2>
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="text-slate-500 border-b border-slate-800 uppercase text-xs font-black">
                        <th class="p-4">נהג</th>
                        <th class="p-4">מספר רכב</th>
                        <th class="p-4">קילומטראז'</th>
                        <th class="p-4 text-left">תאריך</th>
                    </tr>
                </thead>
                <tbody id="fleet-data" class="divide-y divide-slate-800 text-sm">
                    <tr><td colspan="4" class="p-8 text-center text-slate-500 animate-pulse">מתחבר למערכת גדא גרופ...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadFleetData() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/yzlhwfcvmfebt');
                const data = await response.json();
                const tableBody = document.getElementById('fleet-data');
                tableBody.innerHTML = '';

                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-400">אין עדיין דיווחים.</td></tr>';
                    return;
                }

                data.reverse().forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-800/50 transition-colors";
                    tr.innerHTML = `
                        <td class="p-4 font-bold text-white">${row.driver_name || '-'}</td>
                        <td class="p-4 text-slate-300 italic">${row.car_number || '-'}</td>
                        <td class="p-4 font-black text-blue-400 text-lg">${Number(row.km).toLocaleString() || '-'}</td>
                        <td class="p-4 text-slate-500 text-xs text-left font-mono">${row.date || '-'}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                document.getElementById('fleet-data').innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500">שגיאה בחיבור לנתונים.</td></tr>';
            }
        }
        loadFleetData();
        setInterval(loadFleetData, 60000); // רענון כל דקה
    </script>
</body>
</html>
