<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada grup - ניהול צי מלא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0f1d; color: #e2e8f0; font-family: system-ui, sans-serif; }
        .gold-accent { color: #d4af37; }
        .premium-card { background: #161e2d; border: 1px solid #1e293b; }
        .update-flash { animation: flash 2s ease-out; }
        @keyframes flash { 0% { background-color: rgba(234, 179, 8, 0.2); } 100% { background-color: transparent; } }
    </style>
</head>
<body class="p-4 md:p-10 text-right">
    <header class="text-center mb-10">
        <div class="text-6xl font-black italic text-yellow-500 mb-2 uppercase tracking-tighter shadow-yellow-500/20 shadow-2xl">Gada grup</div>
        <div class="h-1.5 w-32 bg-yellow-600 mx-auto mb-6 rounded-full shadow-lg"></div>
        <h1 class="text-4xl font-extrabold gold-accent mb-2">גדא י.קרן בע"מ</h1>
        <p class="text-slate-400 font-bold text-lg italic uppercase">ניהול צי רכב - סטס זולין</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="premium-card p-6 rounded-3xl shadow-2xl overflow-x-auto border-t-4 border-yellow-600">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-xl font-bold text-yellow-500">סטטוס צי רכב נוכחי:</h2>
                <span id="last-sync" class="text-xs text-slate-500 font-mono italic text-left">מעדכן נתונים...</span>
            </div>
            
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="text-slate-500 border-b border-slate-800 uppercase text-xs font-black tracking-widest">
                        <th class="p-4">רכב / נהג</th>
                        <th class="p-4">מספר רכב</th>
                        <th class="p-4">טסט</th>
                        <th class="p-4 text-yellow-500">ק"מ נוכחי</th>
                        <th class="p-4">עדכון אחרון</th>
                    </tr>
                </thead>
                <tbody id="fleet-table" class="divide-y divide-slate-800 text-sm">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // רשימת הצי הקבועה של גדא י.קרן
        const staticFleet = [
            { name: "משאית איסוזו סומו", plate: "40131703", test: "-" },
            { name: "יונדאי מסחרי (פרנסואה)", plate: "88791401", test: "-" },
            { name: "רנו גרנד קופה (בר)", plate: "76666903", test: "26.05.2026" },
            { name: "צ'רי (יצחק)", plate: "50734303", test: "07.12.2026" },
            { name: "צ'רי (ליאור)", plate: "50734404", test: "07.12.2026" },
            { name: "מג'י (דורון)", plate: "20600003", test: "09.04.2026" },
            { name: "אופנוע (יניב)", plate: "52942103", test: "-" },
            { name: "רנו גרנד קופה (נועם)", plate: "76860101", test: "02.07.2026" },
            { name: "יונדאי i10 (אריאל)", plate: "73510201", test: "20.07.2026" },
            { name: "MG (איציק)", plate: "87499903", test: "05.08.2026" }
        ];

        async function updateDashboard() {
            try {
                // משיכת הדיווחים מהגוגל שיטס דרך הצינור שלך
                const response = await fetch('https://sheetdb.io/api/v1/yzlhwfcvmfebt');
                const reports = await response.json();
                
                const tableBody = document.getElementById('fleet-table');
                tableBody.innerHTML = ''; // ניקוי הטבלה לפני בנייה מחדש

                staticFleet.forEach(vehicle => {
                    // חיפוש הדיווח הכי חדש עבור הרכב הזה (לפי מספר רכב)
                    // אנחנו מנקים מקפים מהדיווחים ליתר ביטחון כדי שתהיה התאמה
                    const latestReport = reports.filter(r => 
                        r.car_number.replace(/-/g, '') === vehicle.plate
                    ).pop(); // לוקח את האחרון ברשימה

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-800/50 transition-colors";
                    
                    // אם יש דיווח חדש, נסמן את השורה
                    if (latestReport) tr.classList.add('update-flash');

                    tr.innerHTML = `
                        <td class="p-4 font-bold text-white border-r border-slate-800/50">${vehicle.name}</td>
                        <td class="p-4 text-slate-300 italic font-mono">${vehicle.plate}</td>
                        <td class="p-4 text-slate-400 text-xs">${vehicle.test}</td>
                        <td class="p-4 font-black text-blue-400 text-lg">
                            ${latestReport ? Number(latestReport.km).toLocaleString() : '<span class="text-slate-700 italic text-xs">אין דיווח</span>'}
                        </td>
                        <td class="p-4 text-slate-500 text-[10px] font-mono">
                            ${latestReport ? latestReport.date : '-'}
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

                document.getElementById('last-sync').innerText = "סונכרן לאחרונה: " + new Date().toLocaleTimeString('he-IL');
            } catch (error) {
                console.error("Sync Error", error);
            }
        }

        // הפעלה ראשונית ורענון אוטומטי כל דקה
        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
