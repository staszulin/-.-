<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada Group - Premium Fleet Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: system-ui, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .danger-row { background: rgba(239, 68, 68, 0.25) !important; border-right: 4px solid #ef4444 !important; }
        .service-warning { background: rgba(245, 158, 11, 0.2) !important; border-right: 4px solid #f59e0b !important; }
        td, th { white-space: nowrap; padding: 12px 10px; text-align: right; }
    </style>
</head>
<body class="p-2 min-h-screen">
    <header class="text-center mb-6">
        <div class="text-5xl font-black italic text-yellow-500 uppercase tracking-tighter shadow-2xl">GADA GRUP</div>
        <div class="h-1 w-24 bg-yellow-600 mx-auto mt-2 rounded-full"></div>
        <h1 class="text-lg font-bold text-slate-300 mt-2">מערכת בקרת צי רכב חכמה</h1>
    </header>

    <main class="max-w-full mx-auto overflow-x-auto">
        <div class="glass-panel rounded-xl shadow-2xl overflow-hidden">
            <table class="w-full text-right border-collapse text-[11px]">
                <thead>
                    <tr class="bg-white/10 text-slate-400 font-black uppercase tracking-wider">
                        <th>נהג / רכב</th>
                        <th>מספר רכב</th>
                        <th>טסט</th>
                        <th class="text-blue-400">ביטוח</th>
                        <th class="text-green-400 font-bold">טיפול הבא</th>
                        <th class="text-yellow-500 font-extrabold text-xs">ק"מ עדכני</th>
                        <th>עדכון</th>
                    </tr>
                </thead>
                <tbody id="fleet-table" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const staticFleet = [
            { name: "משאית איסוזו סומו", plate: "401-31-703", test: "01.12.26", ins: "01.12.26", interval: 25000 },
            { name: "יונדאי (פרנסואה)", plate: "887-91-401", test: "15.01.27", ins: "01.01.27", interval: 15000 },
            { name: "רנו קופה (בר)", plate: "766-66-903", test: "26.05.26", ins: "01.06.26", interval: 15000, type: "renault" },
            { name: "צ'רי (יצחק)", plate: "507-34-303", test: "07.12.26", ins: "01.12.26", interval: 15000 },
            { name: "צ'רי (ליאור)", plate: "507-34-404", test: "07.12.26", ins: "01.12.26", interval: 15000 },
            { name: "מג'י (דורון)", plate: "206-00-003", test: "09.04.26", ins: "01.04.26", interval: 10000 },
            { name: "אופנוע (יניב)", plate: "529-42-103", test: "10.10.26", ins: "01.10.26", interval: 6000 },
            { name: "רנו קופה (נועם)", plate: "768-60-101", test: "02.07.26", ins: "01.07.26", interval: 15000, type: "renault" },
            { name: "i10 (אריאל)", plate: "735-10-201", test: "20.07.26", ins: "01.07.26", interval: 15000 },
            { name: "MG (איציק)", plate: "874-99-903", test: "05.08.26", ins: "31.07.26", interval: 15000 }
        ];

        async function updateDashboard() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/yzlhwfcvmfebt');
                const reports = await response.json();
                const tableBody = document.getElementById('fleet-table');
                tableBody.innerHTML = '';

                staticFleet.forEach(v => {
                    const lastReport = reports.filter(r => r.car_number.replace(/-/g,'') === v.plate.replace(/-/g,'')).pop();
                    const currentKm = lastReport ? Number(lastReport.km) : 0;
                    
                    // חישוב טיפול הבא
                    let nextServiceKm = Math.ceil((currentKm + 1) / v.interval) * v.interval;
                    if (currentKm === 0) nextServiceKm = v.interval;

                    const kmToService = nextServiceKm - currentKm;
                    const isServiceUrgent = kmToService <= 500;

                    // חישוב סוג טיפול לרנו
                    let serviceInfo = nextServiceKm.toLocaleString();
                    if (v.type === "renault") {
                        const isBig = (nextServiceKm / 15000) % 2 === 0;
                        serviceInfo += isBig ? " (גדול)" : " (קטן)";
                    }

                    const tr = document.createElement('tr');
                    
                    // צבעים: אדום לטסט/ביטוח קרוב, כתום לטיפול קרוב
                    const isDocUrgent = v.test.includes('.04.26') || v.ins.includes('.04.26');
                    if (isDocUrgent) tr.className = "danger-row";
                    else if (isServiceUrgent) tr.className = "service-warning";
                    else tr.className = "hover:bg-white/5";

                    tr.innerHTML = `
                        <td class="font-bold text-slate-100">${v.name}</td>
                        <td class="font-mono text-slate-400">${v.plate}</td>
                        <td class="${isDocUrgent ? 'text-red-500 font-black' : ''}">${v.test}</td>
                        <td class="text-blue-300">${v.ins}</td>
                        <td class="${isServiceUrgent ? 'text-orange-500 font-black animate-pulse' : 'text-green-400 font-bold'}">${serviceInfo}</td>
                        <td class="font-black text-blue-400 text-sm italic">${currentKm > 0 ? currentKm.toLocaleString() : '-'}</td>
                        <td class="text-[9px] text-slate-500 font-mono">${lastReport ? lastReport.date : 'ממתין...'}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error("Update failed"); }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
