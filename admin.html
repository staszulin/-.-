<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gada Group - Live Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: system-ui, sans-serif; padding: 10px; -webkit-user-select: none; user-select: none; }
        .card { background: rgba(30, 41, 59, 0.8); border-radius: 1.2rem; margin-bottom: 12px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .data-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; margin-top: 10px; }
        .lbl { color: #94a3b8; font-size: 9px; text-align: center; margin-bottom: 2px; font-weight: bold; }
        .val { color: #fff; font-size: 10px; font-weight: 800; text-align: center; white-space: nowrap; }
        .live-indicator { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; display: inline-block; margin-left: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body oncontextmenu="return false;">
    <header class="text-center mb-6">
        <div class="text-4xl font-black italic text-yellow-500 uppercase tracking-tighter">GADA GRUP</div>
        <div class="h-1 w-20 bg-yellow-600 mx-auto mt-1 rounded-full"></div>
        <div id="sync-status" class="text-[9px] text-green-500 mt-2 font-bold"><span class="live-indicator"></span>סנכרון פעיל (כל דקה)</div>
    </header>

    <div id="fleet-list"></div>

    <footer class="text-[9px] text-slate-600 text-center mt-6 border-t border-white/5 pt-4 opacity-50">
        © 2026 Gada Group | כל הזכויות שמורות לסטס זולין
    </footer>

    <script>
        const staticFleet = [
            { name: "משאית איסוזו סומו", plate: "401-31-703", test: "22.07.26", ins: "01.12.26", interval: 25000 },
            { name: "יונדאי (פרנסואה)", plate: "887-91-401", test: "15.01.27", ins: "01.01.27", interval: 15000 },
            { name: "רנו קופה (בר)", plate: "766-66-903", test: "26.05.26", ins: "01.06.26", interval: 15000, type: "renault" },
            { name: "צ'רי (יצחק)", plate: "507-34-304", test: "07.12.26", ins: "30.11.26", interval: 15000 },
            { name: "צ'רי (ליאור)", plate: "507-34-404", test: "07.12.26", ins: "30.11.26", interval: 15000 },
            { name: "מג'י (דורון)", plate: "206-00-003", test: "09.04.26", ins: "31.03.26", interval: 10000 },
            { name: "אופנוע (יניב)", plate: "529-42-103", test: "10.10.26", ins: "01.10.26", interval: 6000 },
            { name: "רנו קופה (נועם)", plate: "768-60-101", test: "02.07.26", ins: "01.07.26", interval: 15000, type: "renault" },
            { name: "i10 (אריאל)", plate: "735-10-201", test: "20.07.26", ins: "30.09.26", interval: 15000 },
            { name: "MG (איציק)", plate: "874-99-903", test: "05.08.26", ins: "31.07.26", interval: 15000 }
        ];

        function render(reports = []) {
            const list = document.getElementById('fleet-list');
            let html = '';

            staticFleet.forEach(v => {
                const vPlate = v.plate.replace(/\D/g,'');
                const report = reports.slice().reverse().find(r => {
                    const rPlate = String(r.car_number || '').replace(/\D/g,'');
                    return rPlate === vPlate;
                });

                const currentKm = report ? Number(report.km || 0) : 0;
                let nextSrv = Math.ceil((currentKm + 1) / v.interval) * v.interval;
                if (currentKm === 0) nextSrv = v.interval;
                let srvTxt = nextSrv.toLocaleString();
                if (v.type === "renault") srvTxt += (nextSrv/15000)%2===0 ? " (גד)" : " (קט)";

                html += `
                    <div class="card ${v.test.includes('.04.26') ? 'border-r-4 border-red-500' : ''}">
                        <div class="flex justify-between items-center mb-1 px-1">
                            <div class="text-right">
                                <h3 class="font-bold text-white text-base leading-tight">${v.name}</h3>
                                <p class="text-[9px] text-slate-500 font-mono tracking-tighter">${v.plate}</p>
                            </div>
                            ${currentKm > 0 ? `<div class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded-md font-black italic shadow-[0_0_10px_rgba(59,130,246,0.3)]">${currentKm.toLocaleString()}</div>` : ''}
                        </div>
                        <div class="data-row">
                            <div><p class="lbl">ק"מ עדכני</p><p class="val text-blue-300 font-black">${currentKm > 0 ? currentKm.toLocaleString() : '---'}</p></div>
                            <div><p class="lbl">טסט</p><p class="val">${v.test}</p></div>
                            <div><p class="lbl">ביטוח</p><p class="val">${v.ins}</p></div>
                            <div><p class="lbl">טיפול הבא</p><p class="val text-green-400 font-bold">${srvTxt}</p></div>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        }

        async function sync() {
            try {
                const res = await fetch(`https://sheetdb.io/api/v1/yzlhwfcvmfebt?t=${Date.now()}`);
                const data = await res.json();
                if (Array.isArray(data)) render(data);
                document.getElementById('sync-status').innerHTML = '<span class="live-indicator"></span>סנכרון פעיל (כל דקה)';
            } catch (e) {
                document.getElementById('sync-status').innerHTML = '<span class="live-indicator bg-red-500 animate-none"></span>שגיאת חיבור';
            }
        }

        render();
        sync();
        setInterval(sync, 60000);
    </script>
</body>
</html>
